<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="gopro-api logo">
  <defs>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="lensGlare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#404040"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Black tile (evokes GoPro-style product black, not their logo mark) -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#tile)"/>

  <!-- Generic action-camera silhouette: box body + front lens -->
  <g transform="translate(64 64)">
    <!-- Body -->
    <rect x="-38" y="-18" width="76" height="36" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Lens housing -->
    <circle cx="-18" cy="0" r="16" fill="#262626" stroke="#3d3d3d" stroke-width="1.5"/>
    <circle cx="-18" cy="0" r="11" fill="url(#lensGlare)"/>
    <circle cx="-21" cy="-3" r="4" fill="#525252" opacity="0.5"/>
    <!-- Side / top detail -->
    <rect x="14" y="-10" width="20" height="10" rx="2" fill="#252525" stroke="#333" stroke-width="1"/>
    <!-- Record / status dot -->
    <circle cx="24" cy="-5" r="2.5" fill="#0ea5e9" opacity="0.9"/>
  </g>

  <!-- Thin accent bar (suggest API / data, not a brand mark) -->
  <rect x="36" y="98" width="56" height="3" rx="1.5" fill="#0ea5e9" opacity="0.85"/>
</svg>
